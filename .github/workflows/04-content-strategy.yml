name: "Agent 04 · 内容策略官"

on:
  workflow_dispatch:
    inputs:
      instruction:
        description: "自然语言指令（如：生成本季度策略 / 出本月计划 / 做本周选题）"
        required: false
        default: "做本周选题"
  schedule:
    - cron: "0 1 * * 3"  # 每周三 UTC 01:00 = 北京时间周三早9点（默认做周选题）

jobs:
  run-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Run agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.TRAVEL_AGENTS_PROD }}
          ANTHROPIC_BASE_URL: "https://yunwu.ai/v1"
          AGENT04_INSTRUCTION: ${{ github.event.inputs.instruction || '做本周选题' }}
        run: python agents/04-content-strategy/run.py "$AGENT04_INSTRUCTION"
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "agent04: ${{ github.event.inputs.instruction || '周选题' }}"
          branch: "agent/04-content-strategy-${{ github.run_id }}"
          title: "[Agent 04] ${{ github.event.inputs.instruction || '周选题' }} · 待审核"
          body: |
            指令：${{ github.event.inputs.instruction || '做本周选题（默认）' }}

            产出会根据层级写入以下协作池之一：
            - `collaboration/04-strategy-pool/pending/`（季度策略）
            - `collaboration/04-monthly-plan-pool/pending/`（月度计划）
            - `collaboration/05-topic-plan-pool/pending/`（周度选题）
          labels: "agent-output,needs-review"
