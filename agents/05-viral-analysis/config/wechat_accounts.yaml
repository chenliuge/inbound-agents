# 公众号参考账号池
#
# Agent 05 在 Layer 1+2+3 搜索时，除了用 wechat_kw_search 关键词搜，
# 还会用 wechat_post_history 拉这些账号的历史文章作为补充样本。
#
# 分层对应 SEARCH_STRATEGY.md 的四层策略。
#
# 用户补充方式：直接在下面加账号名（微信公众号的显示名称，不是微信号）。
# 不确定名称的话，在微信搜索公众号看到的名字是什么就写什么。

# ─────────────────────────────────────────
# Layer 1：入境游垂类（最高优先级）
# ─────────────────────────────────────────
layer_1_inbound:
  # 示例（需用户确认）
  # - "入境游观察"
  # - "WildChina"
  # - "环球旅讯"  # 也监控入境游板块
  []  # 暂空，等用户补充

# ─────────────────────────────────────────
# Layer 2：旅游 B 端 / 出境游 / 留学
# ─────────────────────────────────────────
layer_2_adjacent:
  # 示例
  # - "环球旅讯"
  # - "执惠"
  # - "旅界"
  # - "旅行社之友"
  []

# ─────────────────────────────────────────
# Layer 3：泛 B 端营销 / 出海 / AI 工具
# ─────────────────────────────────────────
layer_3_related:
  # 示例
  # - "刘润"
  # - "生财有术"
  # - "增长黑盒"
  # - "42章经"
  # - "老王的营销笔记"
  []

# ─────────────────────────────────────────
# Layer 4：结构参考（不限行业，只看结构）
# ─────────────────────────────────────────
layer_4_structure:
  # 这些账号以"清晰方法论"或"反差叙事"见长，适合学结构
  # - "人神共奋的职场心理学"
  # - "keso怎么看"
  []

# ─────────────────────────────────────────
# 使用规则
# ─────────────────────────────────────────
rules:
  # 每个账号拉取的最近文章数
  max_articles_per_account: 10
  # 回溯天数（只看最近 N 天发布的文章）
  lookback_days: 60
  # 单次分析最多调用的账号数（防 QUOTA）
  max_accounts_per_analysis: 10
