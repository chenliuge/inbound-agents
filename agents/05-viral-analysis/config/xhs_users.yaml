# 小红书账号池（按四层搜索策略分层）
#
# Agent 05 在每个 Layer 的搜索阶段，除了用 xhs_search_note 关键词搜，
# 还会用 xhs_user_post 拉取这里列出的账号的最新笔记作为补充样本。
#
# 分层对应 SEARCH_STRATEGY.md。
#
# 补充方式：
# 1. 在小红书 App 打开博主主页
# 2. 把主页 URL 里的 user_id 复制过来（URL 格式：https://www.xiaohongshu.com/user/profile/XXXXXXX）
# 3. user_id 就是 XXXXXXX 部分
# 4. 可以同时写 nickname 作为注释方便管理

# ─────────────────────────────────────────
# Layer 1：入境游垂类（最高优先级）
# ─────────────────────────────────────────
layer_1_inbound:
  # 格式：user_id: nickname（注释用）
  # 示例：
  # - user_id: "5abc123def456"
  #   nickname: "入境游 XXX"
  []  # 暂空，等用户补充

# ─────────────────────────────────────────
# Layer 2：旅游 B 端 / 出境游 / 海外营销
# ─────────────────────────────────────────
layer_2_adjacent:
  []

# ─────────────────────────────────────────
# Layer 3：泛 B 端营销 / 出海 / AI 工具
# ─────────────────────────────────────────
layer_3_related:
  []

# ─────────────────────────────────────────
# Layer 4：结构参考账号（不限垂类，看结构硬核）
# ─────────────────────────────────────────
layer_4_structure:
  []

# ─────────────────────────────────────────
# 使用规则
# ─────────────────────────────────────────
rules:
  # 每个账号拉取最近 N 条笔记
  max_notes_per_user: 10
  # 单次分析最多调用的账号数（防 QUOTA）
  max_users_per_analysis: 10
