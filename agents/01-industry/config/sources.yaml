sources:
  duckduckgo:
    type: web_search
    api_key_env: null
    default_max_results: 5
    notes: "免费，无需 API Key，偶有限流"

  tavily:
    type: web_search
    endpoint: "https://api.tavily.com/search"
    api_key_env: "TAVILY_API_KEY"
    default_max_results: 5
    notes: "主力搜索，1000 次/月免费，需在 GitHub Secrets 中配置 TAVILY_API_KEY"

  serper:
    type: web_search
    endpoint: "https://google.serper.dev/search"
    api_key_env: "SERPER_API_KEY"
    default_max_results: 5
    notes: "Google 结果，2500 次/月免费，Phase 2 接入"

  xhs:
    type: social_enrichment
    endpoint: "https://cn8n.com/p2/xhs/note_detail2"
    api_key_env: "XHS_API_TOKEN"
    notes: "小红书笔记详情（需 note_id），付费服务，搜索结果中发现小红书 URL 时自动调用"

  github:
    type: structured
    endpoint: "https://api.github.com"
    api_key_env: "GITHUB_TOKEN"
    notes: "AI 工具 trending repos，Phase 3 接入"

  arxiv:
    type: structured
    endpoint: "http://export.arxiv.org/api/query"
    api_key_env: null
    notes: "AI 论文，Phase 3 接入"
